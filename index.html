<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>500 - Errore interno del server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      font-family: Arial, Helvetica, sans-serif;
      color: #202124;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }

    .error-code {
      font-size: 96px;
      font-weight: bold;
      color: #d93025;
      margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .description {
      font-size: 16px;
      color: #5f6368;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
    }

    .button:hover {
      background: #1558b0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="error-code">500</div>

    <div class="title">
      Errore interno del server
    </div>

    <div class="description">
      Si è verificato un problema imprevisto.  
      Riprova più tardi o contatta il supporto tecnico se il problema persiste.
    </div>

    <a href="/" class="button">
      Torna alla homepage
    </a>
  </div>
</body>
</html>
